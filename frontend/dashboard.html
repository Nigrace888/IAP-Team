<!DOCTYPE html>
<html>
<head>
  <title>To-Do Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-8">

<div class="max-w-2xl mx-auto">
  
  <!-- Header -->
  <div class="bg-white rounded-3xl shadow-lg p-8 mb-8">
    <div class="flex justify-between items-center">
      <div>
        <h3 class="text-3xl font-bold text-gray-800">My Tasks</h3>
        <p class="text-gray-500 mt-1">Stay organized</p>
      </div>
      <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-6 rounded-full">
        Logout
      </button>
    </div>
  </div>

  <!-- Add Task Section -->
  <div class="bg-white rounded-3xl shadow-lg p-8 mb-8">
    <div class="flex gap-3">
      <input 
        id="taskInput" 
        type="text" 
        placeholder="Add a new task..."
        class="flex-1 border-0 bg-gray-200 p-4 rounded-full text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400"
        onkeypress="if(event.key === 'Enter') addTask()"
      />
      <button 
        onclick="addTask()"
        class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-full">
        Add Task
      </button>
    </div>
    <p id="taskMsg" class="text-red-500 text-sm mt-2"></p>
  </div>

  <!-- Task Statistics -->
  <div class="grid grid-cols-3 gap-4 mb-8">
    <div class="bg-white rounded-2xl shadow p-4 text-center">
      <p class="text-gray-500 text-sm">Total Tasks</p>
      <p id="totalCount" class="text-3xl font-bold text-gray-800">0</p>
    </div>
    <div class="bg-white rounded-2xl shadow p-4 text-center">
      <p class="text-gray-500 text-sm">Completed</p>
      <p id="completedCount" class="text-3xl font-bold text-green-500">0</p>
    </div>
    <div class="bg-white rounded-2xl shadow p-4 text-center">
      <p class="text-gray-500 text-sm">Pending</p>
      <p id="pendingCount" class="text-3xl font-bold text-orange-500">0</p>
    </div>
  </div>

  <!-- Tasks List -->
  <div class="bg-white rounded-3xl shadow-lg p-8">
    <h2 class="text-xl font-bold text-gray-800 mb-6">Your Tasks</h2>
    
    <div id="tasksList" class="space-y-3">
      <!-- Tasks will be added here -->
      <p class="text-gray-400 text-center py-8">No tasks yet. Add one to get started!</p>
    </div>
  </div>

</div>

<script>

// Load tasks from localStorage
function loadTasks() {
  const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
  return tasks;
}

// Save tasks to localStorage
function saveTasks(tasks) {
  localStorage.setItem('tasks', JSON.stringify(tasks));
}

// Display tasks on page
function displayTasks() {
  const tasks = loadTasks();
  const tasksList = document.getElementById('tasksList');
  
  if (tasks.length === 0) {
    tasksList.innerHTML = '<p class="text-gray-400 text-center py-8">No tasks yet. Add one to get started!</p>';
    updateStats();
    return;
  }

  tasksList.innerHTML = tasks.map((task, index) => `
    <div class="flex items-center justify-between bg-gray-50 p-4 rounded-2xl hover:bg-gray-100 transition">
      <div class="flex items-center flex-1">
        <input 
          type="checkbox" 
          ${task.completed ? 'checked' : ''} 
          onchange="toggleTask(${index})"
          class="w-5 h-5 text-blue-500 rounded focus:ring-2 focus:ring-blue-400 cursor-pointer"
        />
        <span class="ml-4 text-lg ${task.completed ? 'line-through text-gray-400' : 'text-gray-800'} flex-1">
          ${task.text}
        </span>
      </div>
      <div class="flex gap-2">
        <button 
          onclick="editTask(${index})"
          class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg text-sm">
          Edit
        </button>
        <button 
          onclick="deleteTask(${index})"
          class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-lg text-sm">
          Delete
        </button>
      </div>
    </div>
  `).join('');

  updateStats();
}

// Add new task
function addTask() {
  const input = document.getElementById('taskInput');
  const taskMsg = document.getElementById('taskMsg');
  const text = input.value.trim();

  if (!text) {
    taskMsg.innerText = 'Please enter a task';
    return;
  }

  const tasks = loadTasks();
  tasks.push({
    text: text,
    completed: false,
    createdAt: new Date().toISOString()
  });

  saveTasks(tasks);
  input.value = '';
  taskMsg.innerText = '';
  displayTasks();
}

// Edit task
function editTask(index) {
  const tasks = loadTasks();
  const newText = prompt('Edit task:', tasks[index].text);
  
  if (newText !== null && newText.trim()) {
    tasks[index].text = newText.trim();
    saveTasks(tasks);
    displayTasks();
  }
}

// Delete task
function deleteTask(index) {
  if (confirm('Are you sure you want to delete this task?')) {
    const tasks = loadTasks();
    tasks.splice(index, 1);
    saveTasks(tasks);
    displayTasks();
  }
}

// Toggle task completion
function toggleTask(index) {
  const tasks = loadTasks();
  tasks[index].completed = !tasks[index].completed;
  saveTasks(tasks);
  displayTasks();
}

// Update statistics
function updateStats() {
  const tasks = loadTasks();
  const completed = tasks.filter(t => t.completed).length;
  const pending = tasks.length - completed;

  document.getElementById('totalCount').innerText = tasks.length;
  document.getElementById('completedCount').innerText = completed;
  document.getElementById('pendingCount').innerText = pending;
}

// Logout
function logout() {
  if (confirm('Are you sure you want to logout?')) {
    window.location.href = 'index.html';
  }
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
  displayTasks();
});

</script>

</body>
</html>
